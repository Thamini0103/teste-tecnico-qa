name: Cypress Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  cypress-run:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout projeto
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Executar Cypress
        uses: cypress-io/github-action@v6
        with:
          install: true
          runTests: true
